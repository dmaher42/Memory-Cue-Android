name: Android CI Unzip Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -q MemoryCue-App-With-Workflows.zip -d extracted

      - name: Find project directory containing gradlew
        run: |
          set -e
          echo "=== Contents of extracted/ ==="
          ls -la extracted
          GRADLEW_PATH=$(find extracted -maxdepth 4 -name gradlew -print -quit)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: gradlew not found after unzip"
            find extracted -maxdepth 4 -type f | head -40
            exit 1
          fi
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          echo "Found gradlew at: $GRADLEW_PATH"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Print Gradle and Java versions
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          chmod +x ./gradlew
          ./gradlew -v

      - name: Build Debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
