name: Android CI Unzip Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -q MemoryCue-App-With-Workflows.zip -d .

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Print Gradle and Java versions
        working-directory: MemoryCue-App-With-Workflows
        run: |
          chmod +x ./gradlew
          ./gradlew -v

      - name: Build Debug APK
        working-directory: MemoryCue-App-With-Workflows
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: MemoryCue-App-With-Workflows/app/build/outputs/apk/debug/app-debug.apk
